name: Tests & Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Check Python version
        run: |
          python --version
          python -m venv --help
      
      - name: Check syntax
        run: python -m py_compile fl
      
      - name: Run basic tests
        run: |
          mkdir /tmp/test_fl_ci
          cd /tmp/test_fl_ci
          python ${{ github.workspace }}/fl init
          python ${{ github.workspace }}/fl add requests
          python ${{ github.workspace }}/fl list
          python ${{ github.workspace }}/fl doctor
          python ${{ github.workspace }}/fl check
          python ${{ github.workspace }}/fl cache info

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install tools
        run: pip install pylint black flake8
      
      - name: Black format check
        run: black --check fl || true
      
      - name: Flake8 lint
        run: flake8 fl --max-line-length=120 --exclude=.venv || true
      
      - name: Pylint
        run: pylint fl --disable=all --enable=syntax-error || true

  release:
    name: Create Release & Publish to PyPI
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build distribution
        run: |
          pip install build
          python -m build
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: fl ${{ steps.version.outputs.VERSION }}
          body: |
            # fl v${{ steps.version.outputs.VERSION }}
            
            See CHANGELOG.md for details.
            
            ## Installation
            
            ### One-liner:
            ```bash
            curl https://raw.githubusercontent.com/github/fl/main/install.sh | bash
            ```
            
            ### Or via pip:
            ```bash
            pip install fl-tool
            ```
          draft: false
          prerelease: false
      
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/* --skip-existing

  docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Check documentation exists
        run: |
          ls -la README.md COMMAND_REFERENCE.md ARCHITECTURE.md
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
